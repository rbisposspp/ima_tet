<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stylized armchair scene: a child listening to music with a cat on their lap."
    />
    <title>Armchair Scene</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="scene" aria-labelledby="scene-title">
      <h1 id="scene-title" class="sr-only">Cozy armchair listening scene</h1>

      <section class="artboard" role="img" aria-label="A child curled up in a fluffy armchair with a cat on their lap, wearing big headphones and listening to music.">
        <img
          class="scene-image"
          src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 420 240'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23fff6ee'/%3E%3Cstop offset='100%25' stop-color='%23ead9c8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='420' height='240' rx='26' fill='url(%23bg)'/%3E%3Crect x='88' y='70' width='244' height='110' rx='42' fill='%23c86b4d'/%3E%3Crect x='116' y='112' width='188' height='62' rx='28' fill='%23a34e35'/%3E%3Ccircle cx='206' cy='98' r='26' fill='%23f7d4b5'/%3E%3Crect x='180' y='125' width='58' height='34' rx='14' fill='%235d7ecf'/%3E%3Cellipse cx='232' cy='148' rx='36' ry='18' fill='%23efe6d6'/%3E%3C/svg%3E"
          alt="Preview illustration of the cozy armchair scene"
          loading="eager"
          decoding="async"
        />

        <div class="music-toggle-wrap">
          <button id="musicToggle" class="music-toggle" type="button" aria-pressed="true">
            Pause music animation
          </button>
          <p id="musicStatus" class="music-status" aria-live="polite">Music is playing</p>
        </div>

        <div class="equalizer" aria-hidden="true">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>

        <div class="armchair" aria-hidden="true">
          <div class="chair-back"></div>
          <div class="chair-seat"></div>
          <div class="chair-left-arm"></div>
          <div class="chair-right-arm"></div>
        </div>

        <div class="child" aria-hidden="true">
          <div class="head">
            <div class="hair"></div>
            <div class="headphone headband"></div>
            <div class="headphone cup-left"></div>
            <div class="headphone cup-right">
              <span class="brand" aria-hidden="true">RBS ESL Tech Teach</span>
            </div>
          </div>
          <div class="torso"></div>
          <div class="legs"></div>
        </div>

        <div class="cat" aria-hidden="true">
          <div class="cat-head"></div>
          <div class="cat-body"></div>
          <div class="cat-tail"></div>
        </div>
      </section>
    </main>
  </body>
</html>
